# nginx proxy address - http://172.17.0.1:50038

name: guacamole
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  guacd:
    image: guacamole/guacd:latest
    container_name: guacamole-guacd
    restart: always
    pull_policy: always
    logging: *default-logging
    networks:
      - guacamole

  app:
    image: guacamole/guacamole:latest
    container_name: guacamole-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      GUACD_HOSTNAME: guacamole-guacd
      GUACD_PORT: 4822
      POSTGRES_HOSTNAME: guacamole-db
      POSTGRES_DATABASE: ${DB_CREATE_DATABASE_NAME:-guacamole}
      POSTGRES_USER: ${DB_USER_NAME:-guacamole}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    ports:
      - '172.17.0.1:50038:8080'
    depends_on:
      - guacd
      - db
    networks:
      - guacamole

  db:
    image: postgres:latest
    container_name: guacamole-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-guacamole}
      POSTGRES_USER: ${DB_USER_NAME:-guacamole}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - './volumes/data/db/postgres/guacamole:/var/lib/postgresql/data'
    networks:
      - guacamole
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_NAME:-guacamole} -d ${DB_CREATE_DATABASE_NAME:-guacamole}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  guacamole:
    name: guacamole
    external: false
